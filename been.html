<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>咖啡豆單價目表</title>
    <style>
        :root {
            --primary: #3d2b1f;
            --secondary: #8d6e63;
            --bg: #f9f7f2;
            --card-bg: #ffffff;
            --light-roast: #e6b37e;
            --med-roast: #bc6c25;
            --dark-roast: #4a3728;
            --price: #a44a3f;
            --font-main: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(#e0dcd8 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #444;
            margin: 0;
            padding: 20px;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { text-align: center; padding: 15px 0 25px 0; flex-shrink: 0; }
        header h1 { margin: 0; font-size: 2.2em; letter-spacing: 12px; color: var(--primary); font-weight: 900; text-indent: 12px; }

        /* --- 側邊懸浮按鈕 (預設隱藏) --- */
        .fab-container {
            position: fixed;
            bottom: 40px;
            right: 0;
            display: none; /* 預設完全不顯示 */
            flex-direction: column;
            gap: 12px;
            z-index: 999;
            align-items: flex-end;
        }

        /* 當符合管理者條件時，透過 JS 開啟顯示 */
        .fab-container.is-visible { display: flex; }

        .fab {
            height: 48px;
            width: 48px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(61, 43, 31, 0.15);
            border-right: none;
            border-radius: 24px 0 0 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            box-shadow: -2px 4px 12px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            padding-left: 5px;
        }

        .fab i { font-style: normal; font-size: 1.2em; }
        .fab span { 
            max-width: 0; opacity: 0; overflow: hidden;
            transition: all 0.3s; font-weight: 600; font-size: 0.85em;
            white-space: nowrap;
        }

        .fab:active, .fab:hover {
            width: 120px;
            background: var(--primary);
            color: white;
            padding-left: 15px;
            justify-content: flex-start;
        }
        .fab:active span, .fab:hover span { max-width: 80px; opacity: 1; margin-left: 8px; }

        .fab.admin-active { background: var(--dark-roast); color: white; width: 120px; padding-left: 15px; justify-content: flex-start; }
        .fab.admin-active span { max-width: 80px; opacity: 1; margin-left: 8px; }

        /* --- 網格佈局 --- */
        #menuGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 15px 120px 15px;
        }

        /* --- 卡片樣式 --- */
        .card {
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid rgba(224, 220, 216, 0.5);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card.is-hidden { opacity: 0.4; filter: grayscale(1); border: 2px dashed #ccc; }

        .roast-badge { position: absolute; top: 15px; right: 15px; font-size: 0.7em; padding: 3px 10px; color: #fff; font-weight: bold; border-radius: 10px; }
        .lr { background: var(--light-roast); }
        .mr { background: var(--med-roast); }
        .dr { background: var(--dark-roast); }

        .theme-word { font-size: 2.8em; font-weight: bold; color: var(--primary); text-align: center; margin: 5px 0; font-family: serif; }
        .origin { font-size: 0.95em; font-weight: 700; text-align: center; color: var(--secondary); margin-bottom: 4px; }
        .process { background: #fdf1e6; color: #9d6b42; font-size: 0.75em; text-align: center; padding: 2px 10px; border-radius: 4px; width: fit-content; margin: 0 auto 12px auto; }
        .flavor { font-size: 0.85em; color: #666; text-align: center; line-height: 1.5; margin-bottom: 15px; flex-grow: 1; }

        /* --- 價格區塊 --- */
        .price-box { border-top: 1px solid #f2f2f2; padding-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 15px; }
        .price-item { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.85em; }
        .p-label { color: #999; }
        .p-val { font-weight: 800; color: var(--price); }
        .p-val::before { content: '$'; font-size: 0.8em; margin-right: 1px; }

        .status-toggle {
            margin-top: 12px; padding: 8px; border-radius: 8px; border: 1px solid #ddd;
            background: #fff; font-weight: bold; display: none; cursor: pointer; font-size: 0.85em;
        }
        .admin-mode .status-toggle { display: block; }

        /* --- 放大顯示 Modal --- */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 30, 20, 0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px;
        }
        #modal.active { display: flex; }

        .modal-card {
            width: 100%; max-width: 420px; min-height: 580px; background: white; border-radius: 28px;
            padding: 40px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; position: relative;
        }

        .modal-card .theme-word { font-size: 4.5em; margin: 15px 0; }
        .modal-card .flavor { font-size: 1.25em; line-height: 1.7; margin: 30px 0; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        .modal-card .price-box { gap: 15px 30px; }
        .modal-card .p-val { font-size: 1.4em; }

        @media (max-width: 768px) {
            #menuGrid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 150px; }
            header h1 { font-size: 1.8em; letter-spacing: 8px; }
            .theme-word { font-size: 2.2em; }
        }
    </style>
</head>

<body>

    <header>
        <h1>單品豆單</h1>
    </header>

    <div id="menuGrid"></div>

    <div class="fab-container" id="fabLayer">
        <a href="https://christypy.github.io/" class="fab"><i>🏠</i><span>回到首頁</span></a>
        <div class="fab" id="adminBtn" onclick="toggleAdminMode()"><i>⚙️</i><span>管理模式</span></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div id="modalContent"></div>
    </div>

    <script>
        const initialCoffeeData = [
            { id: 1, name: "覺", origin: "哥斯大黎加 奇里波", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "酒漬櫻桃、黑莓、蜜鳳梨、萊姆酒香、黑巧克力", take: 200, stay: 250, pound: 950, drip: 60 },
            { id: 2, name: "花", origin: "衣索比亞 露西藝伎", process: "藝伎水洗", roast: "lr", roastName: "淺焙", flavor: "白玫瑰、蘋果、檸檬、百香果", take: 180, stay: 230, pound: 850, drip: 55 },
            { id: 3, name: "寶", origin: "衣索比亞 吉瑪莉姆", process: "藝伎日曬", roast: "lr", roastName: "淺焙", flavor: "芒果乾、檸檬糖、葡萄、白色花香、甜奶油", take: 180, stay: 230, pound: 850, drip: 55 },
            { id: 4, name: "菩", origin: "衣索比亞 柯契爾", process: "蜜處理", roast: "mr", roastName: "淺中", flavor: "楓糖、蜂蜜、波斯紅茶", take: 130, stay: 180, pound: 700, drip: 45 },
            { id: 5, name: "靜", origin: "衣索比亞 西達摩", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "葡萄、藍莓、佛手柑、水蜜桃、玫瑰", take: 130, stay: 180, pound: 650, drip: 45 },
            { id: 6, name: "果", origin: "衣索比亞 西達摩", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "水蜜桃、荔枝、佛手柑果韻", take: 130, stay: 180, pound: 600, drip: 45 },
            { id: 7, name: "雅", origin: "衣索比亞 西達摩", process: "水洗", roast: "lr", roastName: "淺焙", flavor: "荔枝、蜂蜜、烏龍、檸檬", take: 130, stay: 180, pound: 650, drip: 45 },
            { id: 8, name: "福", origin: "哥斯大黎加 拉米尼塔", process: "水洗", roast: "mr", roastName: "中焙", flavor: "奶油、核桃、太妃糖", take: 130, stay: 180, pound: 550, drip: 40 },
            { id: 9, name: "幻", origin: "肯亞 凱蘭波勒", process: "水洗", roast: "lr", roastName: "淺焙", flavor: "紫藤花、梔子、小紅莓、柑橘、楊桃", take: 130, stay: 180, pound: 680, drip: "-" },
            { id: 10, name: "幻", origin: "肯亞 凱蘭波勒", process: "水洗", roast: "dr", roastName: "中深", flavor: "黑巧克力、煙燻香料、烏梅、桑椹", take: 130, stay: 180, pound: 680, drip: "-" },
            { id: 11, name: "柔", origin: "巴西 喜拉朵", process: "日曬", roast: "mr", roastName: "中焙", flavor: "堅果、可可、奶油、焦糖", take: 130, stay: 180, pound: 450, drip: 35 }
        ];

        let coffeeData = [];
        let isAdminActive = false;

        // --- 核心權限檢查：檢查 URL 是否包含 ?mode=admin ---
        function checkPermission() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            
            if (mode === 'admin') {
                document.getElementById('fabLayer').classList.add('is-visible');
            }
        }

        function initData() {
            checkPermission();
            const hiddenIds = JSON.parse(localStorage.getItem('hiddenCoffeeIds')) || [];
            coffeeData = initialCoffeeData.map(item => ({ ...item, available: !hiddenIds.includes(item.id) }));
            render();
        }

        function saveData() {
            const hiddenIds = coffeeData.filter(item => !item.available).map(item => item.id);
            localStorage.setItem('hiddenCoffeeIds', JSON.stringify(hiddenIds));
        }

        function toggleAdminMode() {
            isAdminActive = !isAdminActive;
            const btn = document.getElementById('adminBtn');
            btn.classList.toggle('admin-active');
            btn.querySelector('span').innerText = isAdminActive ? "完成編輯" : "管理模式";
            document.body.classList.toggle('admin-mode');
            render();
        }

        function toggleStatus(id) {
            const item = coffeeData.find(c => c.id === id);
            item.available = !item.available;
            saveData();
            render();
        }

        function openModal(id) {
            if (isAdminActive) return;
            const item = coffeeData.find(c => c.id === id);
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-card" onclick="event.stopPropagation()">
                    <span class="roast-badge ${item.roast}">${item.roastName}</span>
                    <div class="theme-word">${item.name}</div>
                    <div class="origin">${item.origin}</div>
                    <div class="process">${item.process}</div>
                    <div class="flavor">${item.flavor}</div>
                    <div class="price-box">
                        <div class="price-item"><span class="p-label">外帶</span><span class="p-val">${item.take}</span></div>
                        <div class="price-item"><span class="p-label">內用</span><span class="p-val">${item.stay}</span></div>
                        <div class="price-item"><span class="p-label">半磅</span><span class="p-val">${item.pound}</span></div>
                        <div class="price-item"><span class="p-label">濾掛</span><span class="p-val">${item.drip}</span></div>
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function render() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = coffeeData
                .filter(item => isAdminActive || item.available)
                .map(item => `
                    <div class="card ${!item.available ? 'is-hidden' : ''}" onclick="openModal(${item.id})">
                        <span class="roast-badge ${item.roast}">${item.roastName}</span>
                        <div class="theme-word">${item.name}</div>
                        <div class="origin">${item.origin}</div>
                        <div class="process">${item.process}</div>
                        <div class="flavor">${item.flavor}</div>
                        <div class="price-box">
                            <div class="price-item"><span class="p-label">外帶</span><span class="p-val">${item.take}</span></div>
                            <div class="price-item"><span class="p-label">內用</span><span class="p-val">${item.stay}</span></div>
                        </div>
                        <button class="status-toggle" onclick="event.stopPropagation(); toggleStatus(${item.id})">
                            ${item.available ? '● 供應中' : '○ 暫時缺貨'}
                        </button>
                    </div>
                `).join('');
        }

        initData();
    </script>
</body>
</html>
