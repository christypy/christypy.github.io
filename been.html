<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>咖啡豆單價目表</title>
    <style>
        :root {
            --primary: #3d2b1f;
            --secondary: #8d6e63;
            --bg: #f9f7f2;
            --card-bg: #ffffff;
            --light-roast: #e6b37e;
            --med-roast: #bc6c25;
            --dark-roast: #4a3728;
            --price: #a44a3f;
            --font-main: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--font-main); }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(#e0dcd8 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #444;
            margin: 0;
            padding: 20px;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 20px 0 30px 0;
            flex-shrink: 0;
        }

        header h1 {
            margin: 0;
            font-size: 2.4em;
            letter-spacing: 15px;
            color: var(--primary);
            font-weight: 900;
            text-indent: 15px;
        }

        /* --- 懸浮按鈕 FAB --- */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 999;
        }

        .fab {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(61, 43, 31, 0.2);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
        }

        .fab i { font-style: normal; font-size: 1.4em; }
        .fab span { 
            max-width: 0; opacity: 0; margin-left: 0;
            transition: all 0.4s; font-weight: 600; font-size: 0.9em;
        }

        .fab:hover { width: 140px; background: var(--primary); color: white; }
        .fab:hover span { max-width: 100px; opacity: 1; margin-left: 8px; }
        .fab.admin-active { background: var(--dark-roast); color: white; border-color: var(--dark-roast); }

        /* --- 網格佈局 --- */
        #menuGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 5px 100px 5px;
        }

        /* --- 卡片通用元件 --- */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(224, 220, 216, 0.5);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(61, 43, 31, 0.1); }
        .card.is-hidden { opacity: 0.4; filter: grayscale(1); border: 2px dashed #ccc; }

        .roast-badge { position: absolute; top: 18px; right: 18px; font-size: 0.75em; padding: 4px 12px; color: #fff; font-weight: bold; border-radius: 12px; }
        .lr { background: var(--light-roast); }
        .mr { background: var(--med-roast); }
        .dr { background: var(--dark-roast); }

        .theme-word { font-size: 3em; font-weight: bold; color: var(--primary); text-align: center; margin: 10px 0; font-family: serif; }
        .origin { font-size: 1em; font-weight: 700; text-align: center; color: var(--secondary); margin-bottom: 5px; }
        .process { background: #fdf1e6; color: #9d6b42; font-size: 0.75em; text-align: center; padding: 3px 12px; border-radius: 6px; width: fit-content; margin: 0 auto 15px auto; }
        .flavor { font-size: 0.9em; color: #666; text-align: center; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }

        /* --- 價格區塊精準對齊 --- */
        .price-box {
            border-top: 1px solid #f2f2f2;
            padding-top: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 20px;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline; /* 確保文字底部對齊 */
            font-size: 0.9em;
        }

        .p-label { color: #888; font-size: 0.85em; }
        .p-val { font-weight: 800; color: var(--price); font-size: 1.05em; }
        .p-val::before { content: '$'; font-size: 0.8em; margin-right: 2px; }

        /* 管理模式按鈕 */
        .status-toggle {
            margin-top: 15px; padding: 10px; border-radius: 10px; border: 1px solid #ddd;
            background: #fdfdfd; font-weight: bold; display: none; cursor: pointer; color: var(--primary);
        }
        .admin-mode .status-toggle { display: block; }

        /* --- 放大顯示 Modal --- */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(61, 43, 31, 0.85); backdrop-filter: blur(12px);
            display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px;
        }

        #modal.active { display: flex; }

        .modal-card {
            width: 90vw;
            max-width: 480px; /* 固定寬度確保一致性 */
            min-height: 600px; /* 確保內容不論多寡，外框大小接近 */
            background: white;
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 放大後的字體縮放 */
        .modal-card .theme-word { font-size: 5em; margin: 25px 0; }
        .modal-card .origin { font-size: 1.6em; margin-bottom: 8px; }
        .modal-card .process { font-size: 1.1em; padding: 6px 18px; margin-bottom: 25px; }
        .modal-card .flavor { font-size: 1.35em; line-height: 1.8; color: #333; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 40px; }
        .modal-card .price-box { gap: 20px 40px; }
        .modal-card .p-label { font-size: 1.1em; }
        .modal-card .p-val { font-size: 1.6em; }
        .modal-card .roast-badge { font-size: 1em; padding: 6px 18px; top: 30px; right: 30px; border-radius: 15px; }

        @media (max-width: 768px) {
            #menuGrid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .modal-card { min-height: auto; padding: 40px 25px; }
            .modal-card .theme-word { font-size: 3.5em; }
            .modal-card .flavor { font-size: 1.2em; }
        }
    </style>
</head>

<body>

    <header>
        <h1>單品豆單</h1>
    </header>

    <div id="menuGrid"></div>

    <div class="fab-container">
        <a href="https://christypy.github.io/" class="fab"><i>🏠</i><span>回到首頁</span></a>
        <div class="fab" id="adminBtn" onclick="toggleAdminMode()"><i>⚙️</i><span>管理模式</span></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div id="modalContent"></div>
    </div>

    <script>
        const initialCoffeeData = [
            { id: 1, name: "覺", origin: "哥斯大黎加 奇里波", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "酒漬櫻桃、黑莓、蜜鳳梨、萊姆酒香、黑巧克力", take: 200, stay: 250, pound: 950, drip: 60 },
            { id: 2, name: "花", origin: "衣索比亞 露西藝伎", process: "藝伎水洗", roast: "lr", roastName: "淺焙", flavor: "白玫瑰、蘋果、檸檬、百香果", take: 180, stay: 230, pound: 850, drip: 55 },
            { id: 3, name: "寶", origin: "衣索比亞 吉瑪莉姆", process: "藝伎日曬", roast: "lr", roastName: "淺焙", flavor: "芒果乾、檸檬糖、葡萄、白色花香、甜奶油", take: 180, stay: 230, pound: 850, drip: 55 },
            { id: 4, name: "菩", origin: "衣索比亞 柯契爾", process: "蜜處理", roast: "mr", roastName: "淺中", flavor: "楓糖、蜂蜜、波斯紅茶", take: 130, stay: 180, pound: 700, drip: 45 },
            { id: 5, name: "靜", origin: "衣索比亞 西達摩", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "葡萄、藍莓、佛手柑、水蜜桃、玫瑰", take: 130, stay: 180, pound: 650, drip: 45 },
            { id: 6, name: "果", origin: "衣索比亞 西達摩", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "水蜜桃、荔枝、佛手柑果韻", take: 130, stay: 180, pound: 600, drip: 45 },
            { id: 7, name: "雅", origin: "衣索比亞 西達摩", process: "水洗", roast: "lr", roastName: "淺焙", flavor: "荔枝、蜂蜜、烏龍、檸檬", take: 130, stay: 180, pound: 650, drip: 45 },
            { id: 8, name: "福", origin: "哥斯大黎加 拉米尼塔", process: "水洗", roast: "mr", roastName: "中焙", flavor: "奶油、核桃、太妃糖", take: 130, stay: 180, pound: 550, drip: 40 },
            { id: 9, name: "幻", origin: "肯亞 凱蘭波勒", process: "水洗", roast: "lr", roastName: "淺焙", flavor: "紫藤花、梔子、小紅莓、柑橘、楊桃", take: 130, stay: 180, pound: 680, drip: "-" },
            { id: 10, name: "幻", origin: "肯亞 凱蘭波勒", process: "水洗", roast: "dr", roastName: "中深", flavor: "黑巧克力、煙燻香料、烏梅、桑椹", take: 130, stay: 180, pound: 680, drip: "-" },
            { id: 11, name: "柔", origin: "巴西 喜拉朵", process: "日曬", roast: "mr", roastName: "中焙", flavor: "堅果、可可、奶油、焦糖", take: 130, stay: 180, pound: 450, drip: 35 }
        ];

        let coffeeData = [];
        let isAdmin = false;

        function initData() {
            const hiddenIds = JSON.parse(localStorage.getItem('hiddenCoffeeIds')) || [];
            coffeeData = initialCoffeeData.map(item => ({
                ...item,
                available: !hiddenIds.includes(item.id)
            }));
            render();
        }

        function saveData() {
            const hiddenIds = coffeeData.filter(item => !item.available).map(item => item.id);
            localStorage.setItem('hiddenCoffeeIds', JSON.stringify(hiddenIds));
        }

        function toggleAdminMode() {
            isAdmin = !isAdmin;
            const btn = document.getElementById('adminBtn');
            btn.classList.toggle('admin-active');
            btn.querySelector('span').innerText = isAdmin ? "完成編輯" : "管理模式";
            document.body.classList.toggle('admin-mode');
            render();
        }

        function toggleStatus(id) {
            const item = coffeeData.find(c => c.id === id);
            item.available = !item.available;
            saveData();
            render();
        }

        function openModal(id) {
            if (isAdmin) return;
            const item = coffeeData.find(c => c.id === id);
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-card" onclick="event.stopPropagation()">
                    <span class="roast-badge ${item.roast}">${item.roastName}</span>
                    <div class="theme-word">${item.name}</div>
                    <div class="origin">${item.origin}</div>
                    <div class="process">${item.process}</div>
                    <div class="flavor">${item.flavor}</div>
                    <div class="price-box">
                        <div class="price-item"><span class="p-label">外帶</span><span class="p-val">${item.take}</span></div>
                        <div class="price-item"><span class="p-label">內用</span><span class="p-val">${item.stay}</span></div>
                        <div class="price-item"><span class="p-label">半磅</span><span class="p-val">${item.pound}</span></div>
                        <div class="price-item"><span class="p-label">濾掛</span><span class="p-val">${item.drip}</span></div>
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function render() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = coffeeData
                .filter(item => isAdmin || item.available)
                .map(item => `
                    <div class="card ${!item.available ? 'is-hidden' : ''}" onclick="openModal(${item.id})">
                        <span class="roast-badge ${item.roast}">${item.roastName}</span>
                        <div class="theme-word">${item.name}</div>
                        <div class="origin">${item.origin}</div>
                        <div class="process">${item.process}</div>
                        <div class="flavor">${item.flavor}</div>
                        <div class="price-box">
                            <div class="price-item"><span class="p-label">外帶</span><span class="p-val">${item.take}</span></div>
                            <div class="price-item"><span class="p-label">內用</span><span class="p-val">${item.stay}</span></div>
                        </div>
                        <button class="status-toggle" onclick="event.stopPropagation(); toggleStatus(${item.id})">
                            ${item.available ? '● 供應中' : '○ 暫時缺貨'}
                        </button>
                    </div>
                `).join('');
        }

        initData();
    </script>
</body>
</html>
