<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu</title>
    <style>
        :root {
            --primary: #3d2b1f; 
            --secondary: #8d6e63; 
            --bg: #f9f7f2; 
            --card-bg: #ffffff;
            --light-roast: #e6b37e; 
            --med-roast: #bc6c25;   
            --dark-roast: #4a3728;  
            --price: #a44a3f;       
            --font-main: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(#e0dcd8 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #444;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #menuGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 16px 140px 16px;
            align-items: stretch; /* 關鍵：確保同一列卡片高度一致 */
        }

        /* --- 卡片樣式優化 --- */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid rgba(61, 43, 31, 0.08);
            padding: 24px 20px;
            display: flex;
            flex-direction: column; /* 垂直排列內容 */
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            height: 100%; /* 讓卡片撐滿 Grid 單元格 */
        }
        .card:active { transform: scale(0.97); background: #fcfcfc; }
        .card.is-hidden { opacity: 0.35; filter: grayscale(1); border: 2px dashed #ccc; }

        /* 焙度標籤 */
        .roast-badge { position: absolute; top: 12px; right: 12px; font-size: 0.65em; padding: 2px 8px; color: #fff; font-weight: bold; border-radius: 8px; letter-spacing: 1px; }
        .lr { background: var(--light-roast); }
        .mr { background: var(--med-roast); }
        .dr { background: var(--dark-roast); }

        /* 文字排版 */
        .theme-word { font-size: 2.6em; font-weight: bold; color: var(--primary); text-align: center; margin: 4px 0; font-family: "Georgia", serif; flex-shrink: 0; }
        .origin { font-size: 0.9em; font-weight: 700; text-align: center; color: var(--secondary); margin-bottom: 4px; flex-shrink: 0; }
        .process { background: #fdf1e6; color: #9d6b42; font-size: 0.7em; text-align: center; padding: 2px 8px; border-radius: 4px; width: fit-content; margin: 0 auto 12px auto; font-weight: 600; flex-shrink: 0; }
        
        /* 風味敘述區塊：關鍵在於 flex-grow: 1，它會吃掉剩餘空間，將價格推到底部 */
        .flavor { font-size: 0.85em; color: #777; text-align: center; line-height: 1.6; margin-bottom: 15px; flex-grow: 1; display: flex; align-items: center; justify-content: center; }

        /* --- 經典飲品清單 --- */
        .classic-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .classic-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .classic-item:last-child { border-bottom: none; }
        .classic-name { font-weight: 600; color: var(--primary); font-size: 0.95em; }
        .classic-price { font-weight: 800; color: var(--price); font-size: 1.05em; }
        .classic-price::before { content: '$'; font-size: 0.8em; margin-right: 2px; }

        /* 價格區塊：固定在底部 */
        .price-box { border-top: 1px solid #f8f8f8; padding-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; flex-shrink: 0; }
        .price-item { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.8em; }
        .p-label { color: #bbb; }
        .p-val { font-weight: 800; color: var(--price); font-size: 1.1em; }
        .p-val::before { content: '$'; font-size: 0.8em; margin-right: 1px; }

        /* --- 管理功能與 Modal --- */
        .fab-container { position: fixed; bottom: 30px; right: 0; display: none; flex-direction: column; gap: 12px; z-index: 999; }
        .fab-container.is-visible { display: flex; }
        .fab { height: 44px; width: 44px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(61, 43, 31, 0.1); border-right: none; border-radius: 22px 0 0 22px; display: flex; align-items: center; justify-content: center; color: var(--primary); text-decoration: none; box-shadow: -2px 4px 10px rgba(0,0,0,0.05); transition: all 0.3s; cursor: pointer; padding-left: 5px; }
        .fab span { max-width: 0; opacity: 0; overflow: hidden; transition: 0.3s; font-weight: 600; font-size: 0.8em; white-space: nowrap; }
        .fab:active, .fab:hover { width: 110px; background: var(--primary); color: white; padding-left: 12px; justify-content: flex-start; }
        .fab:active span, .fab:hover span { max-width: 70px; opacity: 1; margin-left: 8px; }
        .fab.admin-active { background: var(--dark-roast); color: white; width: 110px; padding-left: 12px; justify-content: flex-start; }
        .fab.admin-active span { max-width: 70px; opacity: 1; margin-left: 8px; }

        .status-toggle { margin-top: 12px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-weight: bold; display: none; cursor: pointer; font-size: 0.8em; }
        .admin-mode .status-toggle { display: block; }

        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 20, 10, 0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        #modal.active { display: flex; }
        .modal-card { 
            width: 360px;
            max-width: calc(100vw - 48px);
            background: white; 
            border-radius: 24px; 
            padding: 30px 25px; 
            position: relative;
            display: flex;
            flex-direction: column;
            height: 420px;
        }
        .modal-card .theme-word { font-size: 3em; }
        .modal-card .flavor { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
            font-size: 0.9em;
            color: #777;
            line-height: 1.6;
            overflow: hidden;
        }
        .modal-card .price-box { flex-shrink: 0; }
        @media (max-width: 768px) {
            .modal-card { 
                height: 380px;
            }
            .modal-card .theme-word { font-size: 2.4em; }
            .modal-card .flavor { font-size: 0.82em; }
        }

        @media (max-width: 768px) {
            #menuGrid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px 8px 140px 8px; }
            .card { padding: 16px 12px; }
            .theme-word { font-size: 2.2em; }
            .origin { font-size: 0.88em; }
            .process { font-size: 0.78em; }
            .flavor { font-size: 0.82em; }
            .p-label { font-size: 0.85em; }
            .p-val { font-size: 1.05em; }
            .classic-name { font-size: 0.95em; }
            .classic-price { font-size: 1.05em; }
            .roast-badge { font-size: 0.72em; }
        }
    </style>
</head>

<body>

    <div id="menuGrid"></div>

    <div class="fab-container" id="fabLayer">
        <a href="https://christypy.github.io/" class="fab">🏠<span>首頁</span></a>
        <div class="fab" id="adminBtn" onclick="toggleAdminMode()">⚙️<span>管理</span></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div id="modalContent"></div>
    </div>

    <script>
        const initialCoffeeData = [
            { 
                type: "classic", 
                items: [
                    { n: "熱美式", p: 70 }, { n: "冰美式", p: 75 },
                    { n: "熱拿鐵", p: 85 }, { n: "冰拿鐵", p: 85 },
                    { n: "可可歐蕾", p: 85 }, { n: "抹茶歐蕾", p: 85 },
                    { n: "牛奶", p: 50 }
                ]
            },
            { id: 1, name: "覺", origin: "哥斯大黎加 奇里波", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "酒漬櫻桃、黑莓、蜜鳳梨、萊姆酒香、黑巧克力", take: 200, stay: 250, pound: 950, drip: 60 },
            { id: 2, name: "花", origin: "衣索比亞 露西藝伎", process: "藝伎水洗", roast: "lr", roastName: "淺焙", flavor: "白玫瑰、蘋果、檸檬、百香果", take: 180, stay: 230, pound: 850, drip: 55 },
            { id: 3, name: "寶", origin: "衣索比亞 吉瑪莉姆", process: "藝伎日曬", roast: "lr", roastName: "淺焙", flavor: "芒果乾、檸檬糖、葡萄、白色花香、甜奶油", take: 180, stay: 230, pound: 850, drip: 55 },
            { id: 4, name: "菩", origin: "衣索比亞 柯契爾", process: "蜜處理", roast: "mr", roastName: "淺中", flavor: "楓糖、蜂蜜、波斯紅茶", take: 130, stay: 180, pound: 700, drip: 45 },
            { id: 5, name: "靜", origin: "衣索比亞 西達摩", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "葡萄、藍莓、佛手柑、水蜜桃、玫瑰", take: 130, stay: 180, pound: 650, drip: 45 },
            { id: 6, name: "果", origin: "衣索比亞 西達摩", process: "日曬", roast: "lr", roastName: "淺焙", flavor: "水蜜桃、荔枝、佛手柑果韻", take: 130, stay: 180, pound: 600, drip: 45 },
            { id: 7, name: "雅", origin: "衣索比亞 西達摩", process: "水洗", roast: "lr", roastName: "淺焙", flavor: "荔枝、蜂蜜、烏龍、檸檬", take: 130, stay: 180, pound: 650, drip: 45 },
            { id: 8, name: "福", origin: "哥斯大黎加 拉米尼塔", process: "水洗", roast: "mr", roastName: "中焙", flavor: "奶油、核桃、太妃糖", take: 130, stay: 180, pound: 550, drip: 40 },
            { id: 9, name: "幻", origin: "肯亞 凱蘭波勒", process: "水洗", roast: "lr", roastName: "淺焙", flavor: "紫藤花、梔子、小紅莓、柑橘、楊桃", take: 130, stay: 180, pound: 680, drip: "-" },
            { id: 10, name: "幻", origin: "肯亞 凱蘭波勒", process: "水洗", roast: "dr", roastName: "中深", flavor: "黑巧克力、煙燻香料、烏梅、桑椹", take: 130, stay: 180, pound: 680, drip: "-" },
            { id: 11, name: "柔", origin: "巴西 喜拉朵", process: "日曬", roast: "mr", roastName: "中焙", flavor: "堅果、可可、奶油、焦糖", take: 130, stay: 180, pound: 450, drip: 35 }
        ];

        let coffeeData = [];
        let isAdminActive = false;

        function checkPermission() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'admin') document.getElementById('fabLayer').classList.add('is-visible');
        }

        function initData() {
            checkPermission();
            const hiddenIds = JSON.parse(localStorage.getItem('hiddenCoffeeIds')) || [];
            coffeeData = initialCoffeeData.map(item => ({ ...item, available: item.type === 'classic' ? true : !hiddenIds.includes(item.id) }));
            render();
        }

        function saveData() {
            const hiddenIds = coffeeData.filter(item => !item.available).map(item => item.id);
            localStorage.setItem('hiddenCoffeeIds', JSON.stringify(hiddenIds));
        }

        function toggleAdminMode() {
            isAdminActive = !isAdminActive;
            const btn = document.getElementById('adminBtn');
            btn.classList.toggle('admin-active');
            document.body.classList.toggle('admin-mode');
            render();
        }

        function toggleStatus(id) {
            const item = coffeeData.find(c => c.id === id);
            item.available = !item.available;
            saveData();
            render();
        }

        function openModal(id) {
            if (isAdminActive) return;
            const item = coffeeData.find(c => c.id === id);
            if (!item || item.type === 'classic') return;
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-card" onclick="event.stopPropagation()">
                    <span class="roast-badge ${item.roast}">${item.roastName}</span>
                    <div class="theme-word">${item.name}</div>
                    <div class="origin">${item.origin}</div>
                    <div class="process">${item.process}</div>
                    <div class="flavor">${item.flavor}</div>
                    <div class="price-box">
                        <div class="price-item"><span class="p-label">外帶</span><span class="p-val">${item.take}</span></div>
                        <div class="price-item"><span class="p-label">內用</span><span class="p-val">${item.stay}</span></div>
                        <div class="price-item"><span class="p-label">半磅</span><span class="p-val">${item.pound}</span></div>
                        <div class="price-item"><span class="p-label">濾掛</span><span class="p-val">${item.drip}</span></div>
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function render() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = coffeeData
                .filter(item => isAdminActive || item.available)
                .map(item => {
                    if (item.type === 'classic') {
                        return `
                            <div class="card">
                                <ul class="classic-list">
                                    ${item.items.map(i => `<li class="classic-item"><span class="classic-name">${i.n}</span><span class="classic-price">${i.p}</span></li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }
                    return `
                        <div class="card ${!item.available ? 'is-hidden' : ''}" onclick="openModal(${item.id})">
                            <span class="roast-badge ${item.roast}">${item.roastName}</span>
                            <div class="theme-word">${item.name}</div>
                            <div class="origin">${item.origin}</div>
                            <div class="process">${item.process}</div>
                            <div class="flavor">${item.flavor}</div>
                            <div class="price-box">
                                <div class="price-item"><span class="p-label">外帶</span><span class="p-val">${item.take}</span></div>
                                <div class="price-item"><span class="p-label">內用</span><span class="p-val">${item.stay}</span></div>
                            </div>
                            <button class="status-toggle" onclick="event.stopPropagation(); toggleStatus(${item.id})">
                                ${item.available ? '● 供應中' : '○ 缺貨中'}
                            </button>
                        </div>
                    `;
                }).join('');
        }

        initData();
    </script>
</body>
</html>
